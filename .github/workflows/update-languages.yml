name: Update README Languages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        env:
          GITHUB_USERNAME: jadepics
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_languages.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "Update languages in README"
          git push
